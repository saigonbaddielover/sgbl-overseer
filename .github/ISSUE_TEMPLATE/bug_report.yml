name: Bug report
description: Something in overseer doesn't work
labels: [bug]
body:
  - type: textarea
    id: what
    attributes:
      label: What happened
      description: The exact command you ran and what went wrong (paste the error).
    validations:
      required: true
  - type: textarea
    id: doctor
    attributes:
      label: overseer doctor output
      description: "Run and paste: `bash \"$CLAUDE_PLUGIN_ROOT/skills/overseer/scripts/overseer\" doctor` (or from a clone: `overseer/skills/overseer/scripts/overseer doctor`)"
      render: text
    validations:
      required: true
  - type: input
    id: ccver
    attributes:
      label: Claude Code version (`claude --version`)
    validations:
      required: true
  - type: input
    id: os
    attributes:
      label: OS / distro
  - type: input
    id: tmuxver
    attributes:
      label: tmux version (`tmux -V`)
  - type: dropdown
    id: target
    attributes:
      label: Target
      description: What were you driving?
      options:
        - Local Linux tmux pane
        - Remote Linux tmux pane (deploy/on)
        - Remote Windows console (win* commands)
    validations:
      required: true
  - type: textarea
    id: windows
    attributes:
      label: Windows target details (only for a `win <host> <verb>` bug)
      description: |
        Windows build (`winver`), `pwsh --version`, whether the SSH login and the console user are the
        same account, and the output of `overseer win <host> list`.
        **Redact host names, user names and IPs — and never paste a broker descriptor: it holds the auth token.**
      render: text
  - type: textarea
    id: extra
    attributes:
      label: Anything else
