name: Feature request
description: Suggest an improvement, or a new agent harness to support
labels: [enhancement]
body:
  - type: textarea
    id: idea
    attributes:
      label: What would you like?
    validations:
      required: true
  - type: textarea
    id: why
    attributes:
      label: Why / use case
  - type: input
    id: harness
    attributes:
      label: If it's a new harness, which one? (Codex, OpenCode, ...)
