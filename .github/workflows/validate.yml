name: validate

on:
  push:
    branches: [main]
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: JSON manifests are valid
        run: |
          for f in .claude-plugin/marketplace.json \
                   overseer/.claude-plugin/plugin.json \
                   overseer/hooks/hooks.json; do
            echo "jq: $f"; jq empty "$f"
          done

      - name: plugin.json and marketplace entry versions agree
        run: |
          pv=$(jq -r .version overseer/.claude-plugin/plugin.json)
          mv=$(jq -r '.plugins[] | select(.name=="overseer") | .version' .claude-plugin/marketplace.json)
          echo "plugin=$pv marketplace=$mv"
          test -n "$pv" && test "$pv" = "$mv"

      - name: a version bump must bring a CHANGELOG entry
        if: github.event_name == 'pull_request'
        run: |
          pv=$(jq -r .version overseer/.claude-plugin/plugin.json)
          base=$(git show "origin/${{ github.base_ref }}:overseer/.claude-plugin/plugin.json" 2>/dev/null | jq -r .version) || base=""
          if [ -z "$base" ]; then
            echo "no baseline plugin.json on origin/${{ github.base_ref }} — skipping"
          elif [ "$pv" = "$base" ]; then
            echo "version unchanged ($pv) — no CHANGELOG entry required"
          elif grep -q "^## \[$pv\]" CHANGELOG.md; then
            echo "ok: $base -> $pv is documented under '## [$pv]'"
          else
            echo "::error::version bumped $base -> $pv but CHANGELOG.md has no '## [$pv]' heading"
            exit 1
          fi

      - name: shell scripts parse and lint
        run: |
          for f in overseer/skills/overseer/scripts/overseer \
                   overseer/skills/overseer/scripts/lib/*.sh \
                   overseer/hooks/turn-done.sh \
                   tests/run.sh \
                   tests/win-flow.sh \
                   tests/win-payloads.sh \
                   tests/stress.sh; do
            bash -n "$f"
          done
          shellcheck -x -S warning overseer/skills/overseer/scripts/overseer
          shellcheck -S warning overseer/hooks/turn-done.sh
          shellcheck -S warning tests/run.sh
          shellcheck -S warning tests/win-flow.sh
          shellcheck -S warning tests/win-payloads.sh
          shellcheck -S warning tests/stress.sh

      - name: parser fixture tests
        run: bash tests/run.sh

      - name: windows flow tests
        run: bash tests/win-flow.sh

  powershell:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v7

      - name: Windows payloads parse
        shell: pwsh
        run: ./tests/win-parse.ps1

      - name: Windows payload contracts
        shell: pwsh
        run: ./tests/win-contracts.ps1

  stress:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: install tmux
        run: sudo apt-get update && sudo apt-get install -y tmux

      - name: harness-free stress subset
        timeout-minutes: 5
        env:
          OVERSEER_STRESS_PERF_LASTREPLY: "20"
          OVERSEER_STRESS_PERF_TURNS: "8"
        run: bash tests/stress.sh
